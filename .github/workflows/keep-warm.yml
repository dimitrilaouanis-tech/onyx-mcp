name: keep-warm
on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /health to keep Render free tier warm
        run: |
          for url in \
            https://onyx-actions.onrender.com/health \
            https://onyx-actions.onrender.com/manifest \
            https://onyx-actions.onrender.com/.well-known/x402.json; do
            echo "GET $url"
            curl -fsSL --max-time 60 "$url" -o /dev/null -w "  HTTP %{http_code}  total %{time_total}s\n" || echo "  FAIL (non-blocking)"
          done
