name: onyx-actions
description: |-
  12 paid agent tools over x402 USDC on Base. HTTP 402 -> sign payment -> 200.
  No API keys, no signup, no subscription. Captcha OCR, SMS OTP via real carrier SIMs,
  HLR lookup, URL text extraction, DNS, WHOIS, email validation, IP geolocation,
  user-agent parsing, password strength, FX conversion. The first MCP that
  price-meters per-call directly through the protocol agents already speak.
homepage: https://github.com/dimitrilaouanis-tech/onyx-mcp
repository: https://github.com/dimitrilaouanis-tech/onyx-mcp
license: MIT
keywords:
  - x402
  - usdc
  - base
  - captcha
  - sms
  - otp
  - hlr
  - whois
  - dns
  - email-validate
  - ip-geolocate
  - payments
  - agentic
  - paid-mcp
  - ddddocr
  - mcp

startCommand:
  type: stdio
  configSchema:
    type: object
    description: Optional config for self-hosted stdio mode. Remote HTTP MCP at https://onyx-actions.onrender.com/mcp/ requires no config.
    properties:
      ONYX_RECEIVE_ADDRESS:
        type: string
        description: Wallet address that receives USDC payments (only for self-hosted paid mode).
      ONYX_NETWORK:
        type: string
        enum: [base, base-sepolia]
        default: base-sepolia
        description: Base mainnet (real USDC) or sepolia testnet (free).
      ONYX_DEMO_MODE:
        type: string
        enum: ["0", "1"]
        default: "1"
        description: 1 returns synthetic OTPs for SMS tool. 0 dispatches to real phone fleet.
    required: []
  commandFunction: |-
    (config) => ({
      command: "python",
      args: ["server.py"],
      env: {
        ONYX_RECEIVE_ADDRESS: config.ONYX_RECEIVE_ADDRESS || "",
        ONYX_NETWORK: config.ONYX_NETWORK || "base-sepolia",
        ONYX_DEMO_MODE: config.ONYX_DEMO_MODE || "1"
      }
    })
