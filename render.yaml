services:
  - type: web
    name: onyx-actions
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn server_http:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ONYX_RECEIVE_ADDRESS
        value: 0xA60939FFf9c04a61c0c0649943675e16A12D7074
      - key: ONYX_NETWORK
        value: base
      - key: ONYX_FACILITATOR_URL
        value: https://x402.org/facilitator
      - key: ONYX_PUBLIC_URL
        value: https://onyx-actions.onrender.com
